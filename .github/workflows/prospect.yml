name: Prospection nocturne

on:
  schedule:
    - cron: '0 3 * * *'  # 3h UTC = 5h heure belge (hiver) / 5h CEST (été)
  workflow_dispatch:      # Bouton "Run workflow" manuel dans GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests gspread oauth2client

      - name: Lancer le scraper
        run: python scraper.py
        env:
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_KEY }}
          GSPREAD_CREDS: ${{ secrets.GSPREAD_CREDS }}
